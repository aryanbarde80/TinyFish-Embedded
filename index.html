<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyFish Agent - TriSight Global</title>
    
    <!-- Green icon with fish -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2322c55e'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-weight='bold'>🐟</text></svg>" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Full-screen iframe */
        .embed-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            border: none;
            background: #0a0a0f;
        }
        
        /* Subtle branding */
        .brand {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(34, 197, 94, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #22c55e40;
            color: #22c55e;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .brand:hover {
            opacity: 1;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* Loading indicator */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #22c55e;
            font-size: 16px;
            z-index: 999;
            background: #1a1a2e;
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid #22c55e40;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Branding (optional) -->
    <div class="brand">
        <span class="dot"></span>
        TinyFish • TriSight Global
    </div>
    
    <!-- Loading indicator -->
    <div class="loading" id="loading">Loading AI Agent...</div>
    
    <!-- Embedded TinyFish Agent -->
    <iframe 
        src="https://tinyfish.netlify.app" 
        class="embed-frame"
        id="agentFrame"
        title="TinyFish AI Agent"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
    
    <script>
        // Hide loading when iframe loads
        const frame = document.getElementById('agentFrame');
        const loading = document.getElementById('loading');
        
        frame.onload = function() {
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
            }, 500);
        };
        
        // Fallback: hide after 5 seconds
        setTimeout(() => {
            if (loading.style.display !== 'none') {
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 500);
            }
        }, 5000);
    </script>
</body>
</html>
